family_section: |
  Kara is married to her high school sweetheart and they have three children together. Their family has lived in the same Davis County neighborhood for over a decade. When she's not working on campaign activities or community service, you can find her at her children's school events, hiking in the nearby canyons, or volunteering with local nonprofit organizations.

