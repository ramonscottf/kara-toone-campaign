leadership_section: |
  Beyond her professional roles, Kara serves on multiple community boards and has been recognized for her commitment to public service:
  - Board Member, Davis County Youth Services
  - Member, Utah County Civic Leadership Council
  - Volunteer, Community Mentorship Programs
  - Active member of local civic and faith organizations

  Her leadership philosophy centers on listening to community members, finding common ground across different perspectives, and implementing practical solutions that improve people's lives.

why_running_title: Why Kara is Running
why_running_content: |
  Kara decided to run for Utah County Council because she believes our community deserves leadership that listens and delivers results. Over the past decade, she's watched Davis County grow—and she's seen both the opportunities and the challenges that growth brings.

  The housing crisis is pricing out young families. Infrastructure hasn't kept pace with demand. Mental health services for first responders are inadequate. School funding remains insufficient. Taxpayers expect transparency and fiscal responsibility.

  These are solvable problems, but they require dedicated, experienced leadership that puts community needs first. Kara brings that commitment, along with a proven track record of building partnerships, managing budgets, and delivering results that improve people's lives.

  She's ready to bring her skills, experience, and passion for Utah County to the county council, where she can make a meaningful difference for the families and communities she loves.
