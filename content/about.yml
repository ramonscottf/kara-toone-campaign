hero_title: About Kara
hero_subtitle: A lifelong Utah County resident with deep roots in our community and a commitment to leadership that puts families first.
hero_image: https://media.kara.fosterlabs.org/Website%20Media%20(Organized)/01_Hero_Images/Hero_About.jpg

story_title: Kara's Story
story_content: |
  Kara Toone has spent her entire life in Utah County. Born and raised in this community, she has watched Davis County grow and transform while maintaining her commitment to the values that make our community special: family, service, and opportunity.

  With deep roots in education, business, and nonprofit leadership, Kara brings a diverse perspective to county governance. She understands the challenges families face—affordable housing, quality schools, safe neighborhoods, and opportunities for good jobs. These aren't abstract policy issues for her; they're the future her own children will inherit.

  Kara believes that good government should be transparent, fiscally responsible, and focused on the real needs of real people. She's not interested in partisan politics or special interests. She's interested in solutions that work for Utah County families.

